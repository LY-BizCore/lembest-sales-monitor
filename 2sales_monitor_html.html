<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAYFMZmnCz937TbCMAWDFCkC3hJVa_1t80",
    authDomain: "sales-monitor-5e493.firebaseapp.com",
    projectId: "sales-monitor-5e493",
    storageBucket: "sales-monitor-5e493.firebasestorage.app",
    messagingSenderId: "480141946656",
    appId: "1:480141946656:web:8ccf5e3ac266e94683b145"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function fbLoad(key) {
    try {
      const snap = await db.collection("appdata").doc(key).get();
      return snap.exists ? snap.data().value : null;
    } catch(e) { console.error("fbLoad",e); return null; }
  }
  async function fbSave(key, value) {
    try { await db.collection("appdata").doc(key).set({ value }); }
    catch(e) { console.error("fbSave",e); }
  }
  function fbListen(key, cb) {
    return db.collection("appdata").doc(key).onSnapshot(snap => {
      if (snap.exists) cb(snap.data().value);
    });
  }
  window._fb = { fbLoad, fbSave, fbListen };
  window._fbReady = true;
  window.dispatchEvent(new Event("fbready"));
</script>

<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

const USER_COLORS=["#1d9e75","#d85a30","#7f77dd","#ba7517","#185fa5","#a32d2d","#3b6d11","#993556"];
const DEFAULT_SKUS=[{id:1,name:"Lechon Manok",price:280},{id:2,name:"Liempo",price:320},{id:3,name:"Sisig",price:180}];
const DEFAULT_USERS=[{id:1,name:"Admin",role:"admin",pin:"1234"}];
const DEFAULT_QUOTAS={};
const TABS_ADMIN=["Dashboard","Entry","Outlets","SKUs","Users","Quotas"];
const TABS_USER=["Dashboard","Entry"];
const ICONS_ADMIN=["ti-chart-bar","ti-plus","ti-building-store","ti-tag","ti-users","ti-target"];
const ICONS_USER=["ti-chart-bar","ti-plus"];
const TAB_COLORS=["#1d9e75","#d85a30","#7f77dd","#ba7517","#185fa5","#b45309"];

function today(){return new Date().toISOString().slice(0,10)}
function fmt(n){return"₱"+Number(n).toLocaleString("en-PH",{minimumFractionDigits:0,maximumFractionDigits:0})}
function getSummary(sales,skus,outletId){
  const rows=sales.filter(s=>!outletId||s.outletId===outletId);
  let qty=0,rev=0;
  rows.forEach(s=>{const sku=skus.find(k=>k.id===s.skuId);if(!sku)return;qty+=s.qty;rev+=s.qty*sku.price});
  return{qty,rev}
}
function Avatar({name,color,size=32}){
  return<span style={{width:size,height:size,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.38,fontWeight:500,color:"#fff",flexShrink:0}}>{name.slice(0,2).toUpperCase()}</span>
}

// ── App ────────────────────────────────────────────────
function App(){
  const[outlets,setOutlets]=useState([]);
  const[skus,setSkus]=useState([]);
  const[sales,setSales]=useState([]);
  const[expenses,setExpenses]=useState([]);
  const[users,setUsers]=useState([]);
  const[quotas,setQuotas]=useState({});
  const[activeUser,setActiveUser]=useState(null);
  const[tab,setTab]=useState(0);
  const[loaded,setLoaded]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const fb=useRef(null);

  useEffect(()=>{
    function init(){
      fb.current=window._fb;
      const{fbLoad,fbListen}=fb.current;
      Promise.all([fbLoad("outlets"),fbLoad("skus"),fbLoad("sales"),fbLoad("users"),fbLoad("expenses")]).then(([o,s,sa,u,ex])=>{
        setOutlets(o||[{id:1,name:"Main Branch"},{id:2,name:"Branch 2"}]);
        setSkus(s||DEFAULT_SKUS);
        setSales(sa||[]);
        setUsers(u||DEFAULT_USERS);
        setExpenses(ex||[]);
        setLoaded(true);
      });
      // Real-time listeners
      fbListen("outlets",v=>setOutlets(v));
      fbListen("skus",v=>setSkus(v));
      fbListen("sales",v=>setSales(v));
      fbListen("users",v=>setUsers(v));
      fbListen("expenses",v=>setExpenses(v));
    }
    if(window._fbReady) init();
    else window.addEventListener("fbready",init,{once:true});
  },[]);

  const saveOutlets=useCallback(async v=>{setOutlets(v);setSyncing(true);await fb.current.fbSave("outlets",v);setSyncing(false)},[]);
  const saveSkus=useCallback(async v=>{setSkus(v);setSyncing(true);await fb.current.fbSave("skus",v);setSyncing(false)},[]);
  const saveSales=useCallback(async v=>{setSales(v);setSyncing(true);await fb.current.fbSave("sales",v);setSyncing(false)},[]);
  const saveUsers=useCallback(async v=>{setUsers(v);setSyncing(true);await fb.current.fbSave("users",v);setSyncing(false)},[]);
  const saveExpenses=useCallback(async v=>{setExpenses(v);setSyncing(true);await fb.current.fbSave("expenses",v);setSyncing(false)},[]);
  const saveQuotas=useCallback(async v=>{setQuotas(v);setSyncing(true);await fb.current.fbSave("quotas",v);setSyncing(false)},[]);

  if(!loaded)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12}}>
      <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#1d9e75,#185fa5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <i className="ti ti-chart-dots" style={{fontSize:28,color:"#fff"}}/>
      </div>
      <div style={{fontSize:14,color:"#6b7280"}}>Connecting to database...</div>
    </div>
  );

  if(!activeUser)return<UserSelect users={users} saveUsers={saveUsers} onSelect={setActiveUser}/>;

  const isAdmin=activeUser.role==="admin";
  const TABS=isAdmin?TABS_ADMIN:TABS_USER;
  const ICONS=isAdmin?ICONS_ADMIN:ICONS_USER;
  const userColor=USER_COLORS[users.findIndex(u=>u.id===activeUser.id)%USER_COLORS.length]||"#1d9e75";
  const safeTab=Math.min(tab,TABS.length-1);

  const pages=isAdmin?[
    <Dashboard key="d" outlets={outlets} skus={skus} sales={sales} saveSales={saveSales} expenses={expenses} saveExpenses={saveExpenses} quotas={quotas}/>,
    <Entry key="e" outlets={outlets} skus={skus} sales={sales} saveSales={saveSales} activeUser={activeUser} expenses={expenses} saveExpenses={saveExpenses}/>,
    <Outlets key="o" outlets={outlets} saveOutlets={saveOutlets} saveSales={saveSales} sales={sales}/>,
    <SKUs key="s" skus={skus} saveSkus={saveSkus} saveSales={saveSales} sales={sales}/>,
    <UsersAdmin key="u" users={users} saveUsers={saveUsers}/>,
    <QuotaManager key="q" outlets={outlets} quotas={quotas} saveQuotas={saveQuotas}/>,
  ]:[
    <Dashboard key="d" outlets={outlets} skus={skus} sales={sales} saveSales={saveSales} expenses={expenses} saveExpenses={saveExpenses} quotas={quotas}/>,
    <Entry key="e" outlets={outlets} skus={skus} sales={sales} saveSales={saveSales} activeUser={activeUser} expenses={expenses} saveExpenses={saveExpenses}/>,
  ];

  return(
    <div style={{maxWidth:420,margin:"0 auto",paddingBottom:72,minHeight:"100vh",background:"#fff"}}>
      <div style={{padding:"14px 16px 10px",borderBottom:"0.5px solid #e5e7eb",display:"flex",alignItems:"center",gap:10,background:"#fff",position:"sticky",top:0,zIndex:5}}>
        <i className="ti ti-chart-dots" style={{fontSize:20,color:"#2563eb"}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:600,color:"#111827",lineHeight:1.2}}>Sales Monitor</div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:syncing?"#f59e0b":"#10b981"}}/>
            <div style={{fontSize:11,color:"#6b7280"}}>{syncing?"Syncing...":"Live · "+outlets.length+" branches"}</div>
          </div>
        </div>
        <button onClick={()=>{setActiveUser(null);setTab(0)}} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:8,border:`1px solid ${userColor}`,background:"none",cursor:"pointer"}}>
          <Avatar name={activeUser.name} color={userColor} size={24}/>
          <span style={{fontSize:12,color:userColor,fontWeight:500}}>{activeUser.name}</span>
          {isAdmin&&<span style={{fontSize:10,background:userColor,color:"#fff",borderRadius:4,padding:"1px 5px"}}>Admin</span>}
        </button>
      </div>
      <div style={{padding:"0 12px"}}>{pages[safeTab]}</div>
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"#3b1f0e",borderTop:"0.5px solid #5c3317",display:"flex",zIndex:10}}>
        {TABS.map((t,i)=>{
          const active=safeTab===i,color=TAB_COLORS[i];
          return(
            <button key={t} onClick={()=>setTab(i)} style={{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:active?color:"#c8a882",position:"relative"}}>
              {active&&<span style={{position:"absolute",top:0,left:"20%",right:"20%",height:3,borderRadius:"0 0 3px 3px",background:color}}/>}
              <i className={`ti ${ICONS[i]}`} style={{fontSize:20}}/>
              <span style={{fontSize:10}}>{t}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

// ── Login ──────────────────────────────────────────────
function UserSelect({users,saveUsers,onSelect}){
  const[step,setStep]=useState("login");
  const[selected,setSelected]=useState(null);
  const[pin,setPin]=useState("");
  const[error,setError]=useState("");
  const[showList,setShowList]=useState(false);
  const[showCreate,setShowCreate]=useState(false);
  const[form,setForm]=useState({name:"",role:"staff",pin:"",pin2:""});
  const[formErr,setFormErr]=useState("");

  function attemptLogin(u){
    if(u.pin){setSelected(u);setPin("");setError("");setStep("pin");setShowList(false)}
    else onSelect(u);
  }
  function pressKey(k){
    if(k==="⌫"){setPin(p=>p.slice(0,-1));setError("")}
    else if(pin.length<4){
      const next=pin+k;setPin(next);
      if(next.length===4){setTimeout(()=>{if(next===selected.pin)onSelect(selected);else{setError("Wrong PIN. Try again.");setPin("")}},120)}
    }
  }

  if(step==="pin"){
    const color=USER_COLORS[users.findIndex(u=>u.id===selected.id)%USER_COLORS.length]||"#1d9e75";
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",background:"#fff",maxWidth:420,margin:"0 auto"}}>
        <button onClick={()=>{setStep("login");setError("")}} style={{position:"absolute",top:20,left:20,background:"none",border:"none",color:"#6b7280",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:13}}>
          <i className="ti ti-arrow-left" style={{fontSize:16}}/> Back
        </button>
        <div style={{textAlign:"center",marginBottom:28}}>
          <Avatar name={selected.name} color={color} size={64}/>
          <div style={{fontSize:17,fontWeight:600,color:"#111827",marginTop:12}}>{selected.name}</div>
          <div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{selected.role==="admin"?"Administrator":"Staff"}</div>
        </div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:14}}>Enter your 4-digit PIN</div>
        <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:6}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:"50%",transition:"background 0.15s",background:pin.length>i?color:"#f3f4f6",border:`1.5px solid ${pin.length>i?color:"#e5e7eb"}`}}/>)}
        </div>
        <div style={{height:22,fontSize:12,color:"#dc2626",textAlign:"center",marginBottom:6}}>{error}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:"100%",maxWidth:260}}>
          {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
            <button key={i} onClick={()=>k!==""&&pressKey(String(k))} style={{padding:"16px 0",borderRadius:12,border:k===""?"none":"0.5px solid #e5e7eb",background:k===""?"transparent":"#f3f4f6",color:"#111827",fontSize:20,fontWeight:500,cursor:k===""?"default":"pointer"}}>{k}</button>
          ))}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 20px",background:"#fff",maxWidth:420,margin:"0 auto",position:"relative"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#1d9e75,#185fa5)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <i className="ti ti-chart-dots" style={{fontSize:32,color:"#fff"}}/>
        </div>
        <div style={{fontSize:22,fontWeight:700,color:"#111827"}}>Sales Monitor</div>
        <div style={{fontSize:13,color:"#6b7280",marginTop:4}}>Multi-outlet tracking system</div>
      </div>
      {!showList?(
        <div style={{width:"100%",maxWidth:320}}>
          <button onClick={()=>setShowList(true)} style={{width:"100%",padding:"13px 0",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1d9e75,#185fa5)",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <i className="ti ti-login" style={{fontSize:18}}/> Sign In
          </button>
          <button onClick={()=>{setShowCreate(true);setShowList(true);setForm({name:"",role:"staff",pin:"",pin2:""});setFormErr("")}} style={{width:"100%",marginTop:10,padding:"12px 0",borderRadius:12,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",fontSize:14,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <i className="ti ti-user-plus" style={{fontSize:17}}/> Create Account
          </button>
          <div style={{textAlign:"center",fontSize:12,color:"#6b7280",marginTop:14}}>{users.length} account{users.length!==1?"s":""} available</div>
        </div>
      ):showCreate?(
        <div style={{width:"100%",maxWidth:320}}>
          <div style={{fontSize:15,fontWeight:600,color:"#111827",marginBottom:18,textAlign:"center"}}>Create Account</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>Full Name</div>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Maria Santos" style={{width:"100%",fontSize:14,padding:"9px 12px",borderRadius:10,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827"}}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>Role</div>
            <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} style={{width:"100%",fontSize:14,padding:"9px 12px",borderRadius:10,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827"}}>
              <option value="staff">Staff</option><option value="admin">Admin</option>
            </select>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>PIN (4 digits, optional)</div>
            <input type="password" inputMode="numeric" maxLength={4} value={form.pin} onChange={e=>setForm({...form,pin:e.target.value.replace(/\D/g,"")})} placeholder="Leave blank for no PIN" style={{width:"100%",fontSize:14,padding:"9px 12px",borderRadius:10,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827"}}/>
          </div>
          {form.pin.length>0&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>Confirm PIN</div>
              <input type="password" inputMode="numeric" maxLength={4} value={form.pin2} onChange={e=>setForm({...form,pin2:e.target.value.replace(/\D/g,"")})} placeholder="Re-enter PIN" style={{width:"100%",fontSize:14,padding:"9px 12px",borderRadius:10,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827"}}/>
            </div>
          )}
          {formErr&&<div style={{fontSize:12,color:"#dc2626",marginBottom:10}}>{formErr}</div>}
          <button onClick={async()=>{
            setFormErr("");
            if(!form.name.trim()){setFormErr("Name is required.");return}
            if(form.pin&&form.pin.length!==4){setFormErr("PIN must be exactly 4 digits.");return}
            if(form.pin&&form.pin!==form.pin2){setFormErr("PINs do not match.");return}
            const u={id:Date.now(),name:form.name.trim(),role:form.role,pin:form.pin||""};
            const next=[...users,u];await saveUsers(next);setShowCreate(false);setShowList(false);onSelect(u);
          }} style={{width:"100%",padding:"11px 0",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1d9e75,#185fa5)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}}>
            Create & Sign In
          </button>
          <button onClick={()=>{setShowCreate(false);setShowList(false)}} style={{width:"100%",padding:"9px",borderRadius:10,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>Cancel</button>
        </div>
      ):(
        <div style={{width:"100%",maxWidth:320}}>
          <div style={{fontSize:13,fontWeight:500,color:"#6b7280",marginBottom:12,textAlign:"center"}}>Select your account</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            {users.length===0&&<div style={{fontSize:13,color:"#6b7280",textAlign:"center",padding:"12px 0"}}>No accounts found.</div>}
            {users.map((u,i)=>{
              const color=USER_COLORS[i%USER_COLORS.length];
              return(
                <button key={u.id} onClick={()=>attemptLogin(u)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:12,border:`1.5px solid ${color}33`,background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                  <Avatar name={u.name} color={color} size={40}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:"#111827"}}>{u.name}</div>
                    <div style={{fontSize:11,color:"#6b7280",marginTop:2,display:"flex",alignItems:"center",gap:5}}>
                      <span style={{padding:"1px 7px",borderRadius:4,background:u.role==="admin"?"#d1fae5":"#f3f4f6",color:u.role==="admin"?"#059669":"#6b7280",fontWeight:500}}>{u.role==="admin"?"Admin":"Staff"}</span>
                      {u.pin&&<span><i className="ti ti-lock" style={{fontSize:10,marginRight:2}}/>PIN</span>}
                    </div>
                  </div>
                  <i className="ti ti-chevron-right" style={{fontSize:16,color:"#6b7280"}}/>
                </button>
              );
            })}
          </div>
          <button onClick={()=>{setShowCreate(false);setShowList(false)}} style={{width:"100%",padding:"9px",borderRadius:10,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>Cancel</button>
        </div>
      )}
      <div style={{position:"absolute",bottom:20,fontSize:11,color:"#9ca3af"}}>Sales Monitor v1.0 · Firebase Live</div>
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────
function Dashboard({outlets,skus,sales,saveSales,expenses,saveExpenses,quotas}){
  const[dateFilter,setDateFilter]=useState(today());
  const[editingSale,setEditingSale]=useState(null);
  const[editSaleForm,setEditSaleForm]=useState({});
  const[editingExp,setEditingExp]=useState(null);
  const[editExpForm,setEditExpForm]=useState({});
  const[openOutlets,setOpenOutlets]=useState({});

  const filtered=sales.filter(s=>s.date===dateFilter);
  const filteredExp=expenses.filter(e=>e.date===dateFilter);
  const total=getSummary(filtered,skus,null);
  const totalExpenses=filteredExp.reduce((s,e)=>s+Number(e.amount),0);
  const sorted=[...outlets].sort((a,b)=>getSummary(filtered,skus,b.id).rev-getSummary(filtered,skus,a.id).rev);

  function saveSaleEdit(){saveSales(sales.map(s=>s.id===editingSale?{...s,skuId:Number(editSaleForm.skuId),outletId:Number(editSaleForm.outletId),qty:Number(editSaleForm.qty)}:s));setEditingSale(null)}
  function deleteSale(id){saveSales(sales.filter(s=>s.id!==id))}
  function saveExpEdit(){saveExpenses(expenses.map(e=>e.id===editingExp?{...e,description:editExpForm.description,amount:Number(editExpForm.amount),notes:editExpForm.notes}:e));setEditingExp(null)}
  function deleteExp(id){saveExpenses(expenses.filter(e=>e.id!==id))}

  const sel={width:"100%",marginBottom:6,fontSize:12,padding:"5px 8px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"#fff",color:"#111827",boxSizing:"border-box"};
  const btnBlue={padding:"4px 10px",border:"none",borderRadius:4,background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600};
  const btnRed={padding:"4px 10px",border:"none",borderRadius:4,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600};

  return(
    <div style={{padding:"12px 0"}}>
      <input type="date" value={dateFilter} onChange={e=>setDateFilter(e.target.value)} style={{width:"100%",marginBottom:12,fontSize:13,padding:"7px 10px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827",boxSizing:"border-box"}}/>
      <div style={{background:"linear-gradient(135deg,#1d9e75,#185fa5)",borderRadius:14,padding:"14px 18px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <i className="ti ti-cash" style={{fontSize:15,color:"rgba(255,255,255,0.8)"}}/>
            <span style={{fontSize:12,color:"rgba(255,255,255,0.85)",fontWeight:500,letterSpacing:0.5}}>TOTAL REVENUE</span>
          </div>
          <div style={{fontSize:30,fontWeight:700,color:"#fff",letterSpacing:-0.5}}>{fmt(total.rev)}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginBottom:4}}>Units Sold</div>
          <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>{total.qty}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>{outlets.length} outlets</div>
        </div>
      </div>
      {totalExpenses>0&&(
        <div style={{background:"#fef2f2",border:"0.5px solid #fca5a5",borderRadius:12,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <i className="ti ti-receipt-2" style={{fontSize:15,color:"#dc2626"}}/>
            <span style={{fontSize:12,color:"#dc2626",fontWeight:500}}>TOTAL EXPENSES</span>
          </div>
          <span style={{fontSize:18,fontWeight:700,color:"#dc2626"}}>{fmt(totalExpenses)}</span>
        </div>
      )}
      <div style={{fontSize:13,fontWeight:600,color:"#111827",marginBottom:8}}>Per Outlet Detail</div>
      {outlets.length===0&&<p style={{fontSize:13,color:"#6b7280"}}>No outlets yet.</p>}
      {sorted.map(o=>{
        const s=getSummary(filtered,skus,o.id);
        const skuBreak=skus.map(sku=>{
          const rows=filtered.filter(r=>r.outletId===o.id&&r.skuId===sku.id);
          const qty=rows.reduce((a,r)=>a+r.qty,0);
          return qty>0?{sku,qty,rev:qty*sku.price,saleIds:rows.map(r=>r.id)}:null;
        }).filter(Boolean);
        const outletExp=filteredExp.filter(e=>e.outletId===o.id);
        const isOpen=openOutlets[o.id]!==false;
        const quota=quotas[o.id]||0;
        const hitQuota=quota>0&&s.rev>=quota;
        const missedQuota=quota>0&&s.rev<quota;
        return(
          <div key={o.id} style={{background: hitQuota?"#f0fdf4": missedQuota?"#fef2f2":"#fff", border:`1.5px solid ${hitQuota?"#16a34a":missedQuota?"#dc2626":"#e5e7eb"}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}>
            <button onPointerDown={()=>setOpenOutlets(p=>({...p,[o.id]:!isOpen}))} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"#111827"}}>{o.name}</div>
                <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{s.qty} units · {fmt(s.rev)}</div>
                {quotas[o.id]>0&&(
                  <div style={{marginTop:4}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}>
                      <span style={{color: s.rev>=quotas[o.id]?"#16a34a":"#dc2626",fontWeight:600}}>
                        {s.rev>=quotas[o.id]?"✔ QUOTA HIT":"✘ BELOW QUOTA"} · {fmt(s.rev)} / {fmt(quotas[o.id])}
                      </span>
                      <span style={{color:"#6b7280"}}>{Math.min(100,Math.round(s.rev/quotas[o.id]*100))}%</span>
                    </div>
                    <div style={{height:6,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:99,width:`${Math.min(100,s.rev/quotas[o.id]*100)}%`,background: s.rev>=quotas[o.id]?"#16a34a":"#dc2626",transition:"width 0.4s"}}/>
                    </div>
                  </div>
                )}
              </div>
              <i className={`ti ti-chevron-${isOpen?"up":"down"}`} style={{fontSize:16,color:"#6b7280",marginLeft:8}}/>
            </button>
            {isOpen&&(
              <div style={{padding:"0 14px 12px"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:6,marginBottom:10}}>
                  {[["Revenue",fmt(s.rev)],["Units",s.qty]].map(([l,v])=>(
                    <div key={l} style={{background:"#f3f4f6",borderRadius:8,padding:"6px 8px"}}>
                      <div style={{fontSize:10,color:"#6b7280"}}>{l}</div>
                      <div style={{fontSize:12,fontWeight:500,color:"#111827"}}>{v}</div>
                    </div>
                  ))}
                </div>
                {skuBreak.length>0?(
                  <div style={{borderTop:"0.5px solid #e5e7eb",paddingTop:8}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#6b7280",marginBottom:6,letterSpacing:0.4}}>SALES</div>
                    {skuBreak.map(({sku,qty,rev,saleIds})=>(
                      <div key={sku.id}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12}}>
                          <span style={{color:"#6b7280"}}>{sku.name}</span>
                          <span style={{color:"#111827"}}>{qty}× &nbsp;{fmt(rev)}</span>
                        </div>
                        {saleIds.map(sid=>{
                          const sale=filtered.find(s=>s.id===sid);
                          if(!sale)return null;
                          return editingSale===sid?(
                            <div key={sid} style={{background:"#f3f4f6",borderRadius:8,padding:"8px 10px",marginBottom:6,position:"relative",zIndex:10}}>
                              <div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>Outlet</div>
                              <select value={editSaleForm.outletId} onChange={e=>setEditSaleForm({...editSaleForm,outletId:e.target.value})} style={sel}>{outlets.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select>
                              <div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>SKU</div>
                              <select value={editSaleForm.skuId} onChange={e=>setEditSaleForm({...editSaleForm,skuId:e.target.value})} style={sel}>{skus.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
                              <div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>Qty</div>
                              <input type="number" min="1" value={editSaleForm.qty} onChange={e=>setEditSaleForm({...editSaleForm,qty:e.target.value})} style={{...sel,marginBottom:8}}/>
                              <div style={{display:"flex",gap:6}}>
                                <button onPointerDown={e=>{e.stopPropagation();saveSaleEdit()}} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Save</button>
                                <button onPointerDown={e=>{e.stopPropagation();setEditingSale(null)}} style={{flex:1,padding:"8px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>Cancel</button>
                              </div>
                            </div>
                          ):(
                            <div key={sid} style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:6,marginBottom:4}}>
                              <span style={{fontSize:11,color:"#6b7280"}}>{sale.enteredBy||"—"} · qty {sale.qty}</span>
                              <button onPointerDown={e=>{e.stopPropagation();setEditingSale(sid);setEditSaleForm({outletId:sale.outletId,skuId:sale.skuId,qty:sale.qty})}} style={btnBlue}>Edit</button>
                              <button onPointerDown={e=>{e.stopPropagation();deleteSale(sid)}} style={btnRed}>Delete</button>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                ):<div style={{fontSize:12,color:"#6b7280",paddingTop:4}}>No sales recorded</div>}
                {outletExp.length>0&&(
                  <div style={{borderTop:"0.5px solid #e5e7eb",paddingTop:8,marginTop:8}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#dc2626",marginBottom:6,letterSpacing:0.4}}>EXPENSES</div>
                    {outletExp.map(ex=>(
                      <div key={ex.id}>
                        {editingExp===ex.id?(
                          <div style={{background:"#f3f4f6",borderRadius:8,padding:"8px 10px",marginBottom:6,position:"relative",zIndex:10}}>
                            <input value={editExpForm.description} onChange={e=>setEditExpForm({...editExpForm,description:e.target.value})} style={{...sel,marginBottom:6}} placeholder="Description"/>
                            <input type="number" value={editExpForm.amount} onChange={e=>setEditExpForm({...editExpForm,amount:e.target.value})} style={{...sel,marginBottom:6}} placeholder="Amount"/>
                            <textarea value={editExpForm.notes} onChange={e=>setEditExpForm({...editExpForm,notes:e.target.value})} rows={2} style={{...sel,resize:"vertical",marginBottom:8}} placeholder="Notes"/>
                            <div style={{display:"flex",gap:6}}>
                              <button onPointerDown={e=>{e.stopPropagation();saveExpEdit()}} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Save</button>
                              <button onPointerDown={e=>{e.stopPropagation();setEditingExp(null)}} style={{flex:1,padding:"8px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>Cancel</button>
                            </div>
                          </div>
                        ):(
                          <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:6}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:12,fontWeight:500,color:"#111827"}}>{ex.description}</div>
                              {ex.notes&&<div style={{fontSize:11,color:"#6b7280"}}>{ex.notes}</div>}
                              <div style={{fontSize:11,color:"#6b7280"}}>by {ex.enteredBy||"—"}</div>
                            </div>
                            <span style={{fontSize:13,fontWeight:600,color:"#dc2626",marginRight:4}}>{fmt(ex.amount)}</span>
                            <button onPointerDown={e=>{e.stopPropagation();setEditingExp(ex.id);setEditExpForm({description:ex.description,amount:ex.amount,notes:ex.notes||""})}} style={btnBlue}>Edit</button>
                            <button onPointerDown={e=>{e.stopPropagation();deleteExp(ex.id)}} style={btnRed}>Delete</button>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Entry ──────────────────────────────────────────────
function Entry({outlets,skus,sales,saveSales,activeUser,expenses,saveExpenses}){
  const[mode,setMode]=useState("sales");
  const[entryMode,setEntryMode]=useState("manual");
  const[outletId,setOutletId]=useState(outlets[0]?.id||"");
  const[skuId,setSkuId]=useState(skus[0]?.id||"");
  const[qty,setQty]=useState("");
  const[cart,setCart]=useState([]);
  const[editingId,setEditingId]=useState(null);
  const[editRow,setEditRow]=useState({});
  const[aiText,setAiText]=useState("");
  const[aiLoading,setAiLoading]=useState(false);
  const[aiResult,setAiResult]=useState(null);
  const[msg,setMsg]=useState("");
  const[saving,setSaving]=useState(false);
  const[expOutletId,setExpOutletId]=useState(outlets[0]?.id||"");
  const[expDesc,setExpDesc]=useState("");
  const[expAmount,setExpAmount]=useState("");
  const[expNotes,setExpNotes]=useState("");
  const[expCart,setExpCart]=useState([]);
  const[editingExpId,setEditingExpId]=useState(null);
  const[editExpRow,setEditExpRow]=useState({});

  function flash(m){setMsg(m);setTimeout(()=>setMsg(""),2500)}

  function addToCart(){
    if(!outletId||!skuId||!qty||Number(qty)<=0){flash("Please fill all fields.");return}
    const sku=skus.find(s=>s.id===Number(skuId));
    const outlet=outlets.find(o=>o.id===Number(outletId));
    setCart(p=>[...p,{tempId:Date.now()+Math.random(),outletId:Number(outletId),outletName:outlet?.name,skuId:Number(skuId),skuName:sku?.name,price:sku?.price,qty:Number(qty)}]);
    setQty("");
  }

  function addExpToCart(){
    if(!expDesc.trim()||!expAmount||Number(expAmount)<=0){flash("Fill description and amount.");return}
    const outlet=outlets.find(o=>o.id===Number(expOutletId));
    setExpCart(p=>[...p,{tempId:Date.now()+Math.random(),outletId:Number(expOutletId),outletName:outlet?.name,description:expDesc.trim(),amount:Number(expAmount),notes:expNotes.trim()}]);
    setExpDesc("");setExpAmount("");setExpNotes("");
  }

  const grandTotal=cart.reduce((s,c)=>s+c.qty*c.price,0);
  const totalQty=cart.reduce((s,c)=>s+c.qty,0);
  const expTotal=expCart.reduce((s,e)=>s+e.amount,0);

  async function recordAll(){
    if(cart.length===0){flash("Add at least one entry.");return}
    setSaving(true);
    await saveSales([...sales,...cart.map(c=>({id:Date.now()+Math.random(),outletId:c.outletId,skuId:c.skuId,qty:c.qty,date:today(),enteredBy:activeUser.name}))]);
    setCart([]);setSaving(false);flash(`${cart.length} entr${cart.length>1?"ies":"y"} recorded!`);
  }

  async function recordExpenses(){
    if(expCart.length===0){flash("Add at least one expense.");return}
    setSaving(true);
    await saveExpenses([...expenses,...expCart.map(e=>({id:Date.now()+Math.random(),outletId:e.outletId,description:e.description,amount:e.amount,notes:e.notes,date:today(),enteredBy:activeUser.name}))]);
    setExpCart([]);setSaving(false);flash(`${expCart.length} expense${expCart.length>1?"s":""} recorded!`);
  }

  async function handleAI(){
    if(!aiText.trim())return;
    setAiLoading(true);setAiResult(null);
    const prompt=`Extract sales entries.\nOutlets: ${outlets.map(o=>`id:${o.id} name:"${o.name}"`).join(", ")}\nSKUs: ${skus.map(s=>`id:${s.id} name:"${s.name}"`).join(", ")}\nNote: "${aiText}"\nReply ONLY with JSON: [{"outletId":1,"skuId":2,"qty":5}]`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const json=await res.json();
      const parsed=JSON.parse(json.content?.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim());
      setAiResult(parsed.map(r=>{const sku=skus.find(s=>s.id===r.skuId);const outlet=outlets.find(o=>o.id===r.outletId);return{tempId:Date.now()+Math.random(),outletId:r.outletId,outletName:outlet?.name,skuId:r.skuId,skuName:sku?.name,price:sku?.price,qty:r.qty}}));
    }catch{flash("Could not parse. Try rephrasing.")}
    setAiLoading(false);
  }

  const sel={width:"100%",marginBottom:10,fontSize:14,padding:"8px 10px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827",boxSizing:"border-box"};

  return(
    <div style={{padding:"12px 0"}}>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["sales","ti-receipt","Sales"],["expenses","ti-receipt-2","Expenses"]].map(([m,ic,label])=>(
          <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"9px",borderRadius:8,border:"0.5px solid #e5e7eb",background:mode===m?(m==="expenses"?"#fef2f2":"#eff6ff"):"#f3f4f6",color:mode===m?(m==="expenses"?"#dc2626":"#2563eb"):"#6b7280",cursor:"pointer",fontSize:13,fontWeight:mode===m?600:400}}>
            <i className={`ti ${ic}`} style={{fontSize:14,marginRight:5}}/>{label}
          </button>
        ))}
      </div>

      {mode==="sales"?(
        <>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["manual","ai"].map(m=>(
              <button key={m} onClick={()=>setEntryMode(m)} style={{flex:1,padding:"8px",borderRadius:8,border:"0.5px solid #e5e7eb",background:entryMode===m?"#eff6ff":"#f3f4f6",color:entryMode===m?"#2563eb":"#6b7280",cursor:"pointer",fontSize:13}}>
                <i className={`ti ${m==="manual"?"ti-pencil":"ti-sparkles"}`} style={{fontSize:14,marginRight:5}}/>{m==="manual"?"Manual":"AI Entry"}
              </button>
            ))}
          </div>
          {entryMode==="manual"?(
            <div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:14,border:"0.5px solid #e5e7eb"}}>
              <label style={{fontSize:12,color:"#6b7280"}}>Outlet</label>
              <select value={outletId} onChange={e=>setOutletId(e.target.value)} style={sel}>{outlets.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select>
              <label style={{fontSize:12,color:"#6b7280"}}>SKU</label>
              <select value={skuId} onChange={e=>setSkuId(e.target.value)} style={sel}>{skus.map(s=><option key={s.id} value={s.id}>{s.name} — {fmt(s.price)}</option>)}</select>
              <label style={{fontSize:12,color:"#6b7280"}}>Quantity</label>
              <input type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addToCart()} placeholder="e.g. 10" style={{...sel,marginBottom:10}}/>
              <button onClick={addToCart} style={{width:"100%",padding:"9px",borderRadius:8,border:"0.5px solid #2563eb",background:"#eff6ff",color:"#2563eb",cursor:"pointer",fontSize:13,fontWeight:500}}>
                <i className="ti ti-plus" style={{fontSize:15,marginRight:5}}/>Add Entry
              </button>
            </div>
          ):(
            <div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:14,border:"0.5px solid #e5e7eb"}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>e.g. "Main Branch sold 5 Lechon Manok"</div>
              <textarea value={aiText} onChange={e=>setAiText(e.target.value)} rows={3} placeholder="Type your sales note..." style={{...sel,resize:"vertical",marginBottom:8}}/>
              <button onClick={handleAI} disabled={aiLoading} style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500}}>
                {aiLoading?"Parsing...":"Parse with AI"}
              </button>
              {aiResult&&(
                <div style={{marginTop:10}}>
                  {aiResult.map((r,i)=><div key={i} style={{fontSize:12,color:"#6b7280",marginBottom:3}}><i className="ti ti-check" style={{color:"#16a34a",marginRight:4}}/>{r.outletName} — {r.skuName} × {r.qty} = {fmt(r.qty*r.price)}</div>)}
                  <button onClick={()=>{setCart(p=>[...p,...aiResult]);setAiText("");setAiResult(null);flash("Added!")}} style={{marginTop:8,width:"100%",padding:"8px",borderRadius:8,border:"0.5px solid #16a34a",background:"#f0fdf4",color:"#16a34a",cursor:"pointer",fontSize:13}}>Add to Entries</button>
                </div>
              )}
            </div>
          )}
          {cart.length>0&&(
            <div style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,overflow:"hidden",marginBottom:12}}>
              <div style={{padding:"10px 14px",borderBottom:"0.5px solid #e5e7eb",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:500,color:"#111827"}}>Entries ({cart.length})</span>
                <button onClick={()=>setCart([])} style={{fontSize:11,color:"#dc2626",background:"none",border:"none",cursor:"pointer"}}>Clear all</button>
              </div>
              {cart.map((c,i)=>(
                <div key={c.tempId} style={{borderBottom:i<cart.length-1?"0.5px solid #e5e7eb":"none"}}>
                  {editingId===c.tempId?(
                    <div style={{padding:"10px 14px",background:"#f9fafb"}}>
                      <select value={editRow.outletId} onChange={e=>{const o=outlets.find(x=>x.id===Number(e.target.value));setEditRow({...editRow,outletId:Number(e.target.value),outletName:o?.name})}} style={{...sel,marginBottom:8}}>{outlets.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select>
                      <select value={editRow.skuId} onChange={e=>{const s=skus.find(x=>x.id===Number(e.target.value));setEditRow({...editRow,skuId:Number(e.target.value),skuName:s?.name,price:s?.price})}} style={{...sel,marginBottom:8}}>{skus.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
                      <input type="number" min="1" value={editRow.qty} onChange={e=>setEditRow({...editRow,qty:Number(e.target.value)})} style={{...sel,marginBottom:10}}/>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>{setCart(p=>p.map(x=>x.tempId===c.tempId?{...x,...editRow}:x));setEditingId(null)}} style={{flex:1,padding:"7px",borderRadius:8,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer",fontSize:13}}>Save</button>
                        <button onClick={()=>setEditingId(null)} style={{flex:1,padding:"7px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:"#111827",fontWeight:500}}>{c.skuName}</div>
                        <div style={{fontSize:11,color:"#6b7280"}}>{c.outletName} · {c.qty} pcs</div>
                      </div>
                      <div style={{fontSize:13,fontWeight:500,color:"#111827",marginRight:4}}>{fmt(c.qty*c.price)}</div>
                      <button onClick={()=>{setEditingId(c.tempId);setEditRow({outletId:c.outletId,outletName:c.outletName,skuId:c.skuId,skuName:c.skuName,price:c.price,qty:c.qty})}} style={{padding:"4px 8px",border:"none",borderRadius:4,background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>Edit</button>
                      <button onClick={()=>setCart(p=>p.filter(x=>x.tempId!==c.tempId))} style={{padding:"4px 8px",border:"none",borderRadius:4,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>Del</button>
                    </div>
                  )}
                </div>
              ))}
              <div style={{padding:"10px 14px",background:"#f9fafb",borderTop:"0.5px solid #e5e7eb"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                  <span style={{fontSize:12,color:"#6b7280"}}>Total Units</span>
                  <span style={{fontSize:13,fontWeight:500,color:"#111827"}}>{totalQty} pcs</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:600,color:"#111827"}}>Grand Total</span>
                  <span style={{fontSize:17,fontWeight:700,color:"#1d9e75"}}>{fmt(grandTotal)}</span>
                </div>
              </div>
            </div>
          )}
          <button onClick={recordAll} disabled={saving||cart.length===0} style={{width:"100%",padding:"11px",borderRadius:8,border:"none",background:cart.length===0?"#f3f4f6":"linear-gradient(135deg,#1d9e75,#185fa5)",color:cart.length===0?"#9ca3af":"#fff",cursor:cart.length===0?"default":"pointer",fontSize:14,fontWeight:600}}>
            {saving?"Saving...":`Record ${cart.length>0?cart.length+" Entr"+(cart.length>1?"ies":"y"):"Sales"}`}
          </button>
        </>
      ):(
        <>
          <div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:14,border:"0.5px solid #e5e7eb"}}>
            <label style={{fontSize:12,color:"#6b7280"}}>Outlet</label>
            <select value={expOutletId} onChange={e=>setExpOutletId(e.target.value)} style={sel}>{outlets.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select>
            <label style={{fontSize:12,color:"#6b7280"}}>Description</label>
            <input value={expDesc} onChange={e=>setExpDesc(e.target.value)} placeholder="e.g. Gas, Supplies" style={sel}/>
            <label style={{fontSize:12,color:"#6b7280"}}>Amount (₱)</label>
            <input type="number" min="1" value={expAmount} onChange={e=>setExpAmount(e.target.value)} placeholder="0" style={sel}/>
            <label style={{fontSize:12,color:"#6b7280"}}>Notes (optional)</label>
            <textarea value={expNotes} onChange={e=>setExpNotes(e.target.value)} placeholder="Additional details..." rows={2} style={{...sel,resize:"vertical",marginBottom:10}}/>
            <button onClick={addExpToCart} style={{width:"100%",padding:"9px",borderRadius:8,border:"0.5px solid #dc2626",background:"#fef2f2",color:"#dc2626",cursor:"pointer",fontSize:13,fontWeight:600}}>
              <i className="ti ti-plus" style={{fontSize:15,marginRight:5}}/>Add Expense
            </button>
          </div>
          {expCart.length>0&&(
            <div style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,overflow:"hidden",marginBottom:12}}>
              <div style={{padding:"10px 14px",borderBottom:"0.5px solid #e5e7eb",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:13,fontWeight:500,color:"#111827"}}>Expenses ({expCart.length})</span>
                <button onClick={()=>setExpCart([])} style={{fontSize:11,color:"#dc2626",background:"none",border:"none",cursor:"pointer"}}>Clear all</button>
              </div>
              {expCart.map((e,i)=>(
                <div key={e.tempId} style={{borderBottom:i<expCart.length-1?"0.5px solid #e5e7eb":"none"}}>
                  {editingExpId===e.tempId?(
                    <div style={{padding:"10px 14px",background:"#f9fafb"}}>
                      <input value={editExpRow.description} onChange={ev=>setEditExpRow({...editExpRow,description:ev.target.value})} placeholder="Description" style={{...sel,marginBottom:8}}/>
                      <input type="number" value={editExpRow.amount} onChange={ev=>setEditExpRow({...editExpRow,amount:ev.target.value})} placeholder="Amount" style={{...sel,marginBottom:8}}/>
                      <textarea value={editExpRow.notes} onChange={ev=>setEditExpRow({...editExpRow,notes:ev.target.value})} placeholder="Notes" rows={2} style={{...sel,resize:"vertical",marginBottom:8}}/>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>{setExpCart(p=>p.map(x=>x.tempId===e.tempId?{...x,...editExpRow}:x));setEditingExpId(null)}} style={{flex:1,padding:"7px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13}}>Save</button>
                        <button onClick={()=>setEditingExpId(null)} style={{flex:1,padding:"7px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"9px 14px"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500,color:"#111827"}}>{e.description}</div>
                        <div style={{fontSize:11,color:"#6b7280"}}>{e.outletName}</div>
                        {e.notes&&<div style={{fontSize:11,color:"#6b7280"}}>{e.notes}</div>}
                      </div>
                      <span style={{fontSize:13,fontWeight:600,color:"#dc2626",marginRight:4}}>{fmt(e.amount)}</span>
                      <button onClick={()=>{setEditingExpId(e.tempId);setEditExpRow({description:e.description,amount:e.amount,notes:e.notes})}} style={{padding:"4px 8px",border:"none",borderRadius:4,background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>Edit</button>
                      <button onClick={()=>setExpCart(p=>p.filter(x=>x.tempId!==e.tempId))} style={{padding:"4px 8px",border:"none",borderRadius:4,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>Del</button>
                    </div>
                  )}
                </div>
              ))}
              <div style={{padding:"10px 14px",background:"#f9fafb",borderTop:"0.5px solid #e5e7eb",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:600,color:"#111827"}}>Total Expenses</span>
                <span style={{fontSize:17,fontWeight:700,color:"#dc2626"}}>{fmt(expTotal)}</span>
              </div>
            </div>
          )}
          <button onClick={recordExpenses} disabled={saving||expCart.length===0} style={{width:"100%",padding:"11px",borderRadius:8,border:"none",background:expCart.length===0?"#f3f4f6":"#dc2626",color:expCart.length===0?"#9ca3af":"#fff",cursor:expCart.length===0?"default":"pointer",fontSize:14,fontWeight:600}}>
            {saving?"Saving...":`Record ${expCart.length>0?expCart.length+" Expense"+(expCart.length>1?"s":""):"Expenses"}`}
          </button>
        </>
      )}
      {msg&&<div style={{marginTop:10,fontSize:13,color:msg.includes("!")?"#16a34a":"#dc2626"}}>{msg}</div>}
    </div>
  );
}

// ── Quota Manager ──────────────────────────────────────
function QuotaManager({outlets,quotas,saveQuotas}){
  const[editing,setEditing]=useState(null);
  const[val,setVal]=useState("");
  const[msg,setMsg]=useState("");
  function flash(m){setMsg(m);setTimeout(()=>setMsg(""),2000)}

  function save(id){
    const n=Number(val);
    if(isNaN(n)||n<0){flash("Enter a valid amount.");return}
    saveQuotas({...quotas,[id]:n});
    setEditing(null);flash("Quota saved!");
  }

  return(
    <div style={{padding:"12px 0"}}>
      <div style={{fontSize:13,color:"#6b7280",marginBottom:14}}>Set a daily sales revenue quota per outlet. Cards turn green when hit, red when missed.</div>
      {msg&&<div style={{fontSize:13,color:"#16a34a",marginBottom:10}}>{msg}</div>}
      {outlets.length===0&&<p style={{fontSize:13,color:"#6b7280"}}>No outlets yet.</p>}
      {outlets.map(o=>{
        const q=quotas[o.id]||0;
        return(
          <div key={o.id} style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom: editing===o.id?10:0}}>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:"#111827"}}>{o.name}</div>
                <div style={{fontSize:12,color: q>0?"#6b7280":"#9ca3af",marginTop:2}}>{q>0?`Quota: ${fmt(q)}`:"No quota set"}</div>
              </div>
              {editing!==o.id&&(
                <button onClick={()=>{setEditing(o.id);setVal(q||"")}} style={{padding:"7px 14px",border:"none",borderRadius:8,background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>
                  {q>0?"Edit":"Set Quota"}
                </button>
              )}
            </div>
            {editing===o.id&&(
              <div>
                <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>Daily Revenue Quota (₱)</div>
                <input type="number" min="0" value={val} onChange={e=>setVal(e.target.value)} placeholder="e.g. 10000" style={{width:"100%",fontSize:14,padding:"8px 10px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827",boxSizing:"border-box",marginBottom:10}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>save(o.id)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Save</button>
                  <button onClick={()=>{if(q>0){saveQuotas({...quotas,[o.id]:0});flash("Quota removed!")}setEditing(null)}} style={{flex:1,padding:"8px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#dc2626",cursor:"pointer",fontSize:13}}>Remove</button>
                  <button onClick={()=>setEditing(null)} style={{flex:1,padding:"8px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Outlets ────────────────────────────────────────────
function Outlets({outlets,saveOutlets,saveSales,sales}){
  const[name,setName]=useState("");
  const[editing,setEditing]=useState(null);
  const[editName,setEditName]=useState("");
  const inp={fontSize:14,padding:"8px 10px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827",width:"100%",boxSizing:"border-box"};
  return(
    <div style={{padding:"12px 0"}}>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="New outlet name" style={{...inp,flex:1}} onKeyDown={e=>{if(e.key==="Enter"&&name.trim()){saveOutlets([...outlets,{id:Date.now(),name:name.trim()}]);setName("")}}}/>
        <button onClick={()=>{if(!name.trim())return;saveOutlets([...outlets,{id:Date.now(),name:name.trim()}]);setName("")}} style={{padding:"8px 14px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:500}}>Add</button>
      </div>
      {outlets.length===0&&<p style={{fontSize:13,color:"#6b7280"}}>No outlets yet.</p>}
      {outlets.map(o=>(
        <div key={o.id} style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
          {editing===o.id?(
            <>
              <input value={editName} onChange={e=>setEditName(e.target.value)} style={{...inp,flex:1}}/>
              <button onClick={()=>{saveOutlets(outlets.map(x=>x.id===o.id?{...x,name:editName.trim()}:x));setEditing(null)}} style={{padding:"6px 10px",borderRadius:8,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer",fontSize:12}}>Save</button>
              <button onClick={()=>setEditing(null)} style={{padding:"6px 10px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:12}}>Cancel</button>
            </>
          ):(
            <>
              <i className="ti ti-building-store" style={{fontSize:18,color:"#6b7280"}}/>
              <span style={{flex:1,fontSize:14,color:"#111827"}}>{o.name}</span>
              <button onClick={()=>{setEditing(o.id);setEditName(o.name)}} style={{padding:"7px 12px",border:"none",borderRadius:8,background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>Edit</button>
              <button onClick={()=>{saveOutlets(outlets.filter(x=>x.id!==o.id));saveSales(sales.filter(s=>s.outletId!==o.id))}} style={{padding:"7px 12px",border:"none",borderRadius:8,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>Delete</button>
            </>
          )}
        </div>
      ))}
    </div>
  );
}

// ── SKUs ───────────────────────────────────────────────
function SKUs({skus,saveSkus,saveSales,sales}){
  const[form,setForm]=useState({name:"",price:""});
  const[editing,setEditing]=useState(null);
  const[editForm,setEditForm]=useState({});
  const inp={fontSize:13,padding:"7px 9px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827",width:"100%",boxSizing:"border-box"};
  return(
    <div style={{padding:"12px 0"}}>
      <div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:16,border:"0.5px solid #e5e7eb"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Add SKU</div>
        <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="SKU name" style={{...inp,marginBottom:8}}/>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Selling price (₱)</div><input type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} placeholder="0" style={inp}/></div>
        <button onClick={()=>{if(!form.name.trim()||!form.price)return;saveSkus([...skus,{id:Date.now(),name:form.name.trim(),price:Number(form.price)}]);setForm({name:"",price:""})}} style={{width:"100%",padding:"8px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13}}>Add SKU</button>
      </div>
      {skus.map(s=>(
        <div key={s.id} style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"10px 14px",marginBottom:8}}>
          {editing===s.id?(
            <>
              <input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} style={{...inp,marginBottom:8}}/>
              <div style={{marginBottom:8}}><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Selling price (₱)</div><input type="number" value={editForm.price} onChange={e=>setEditForm({...editForm,price:e.target.value})} style={inp}/></div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{saveSkus(skus.map(x=>x.id===s.id?{...x,name:editForm.name,price:Number(editForm.price)}:x));setEditing(null)}} style={{flex:1,padding:"6px",borderRadius:8,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer",fontSize:12}}>Save</button>
                <button onClick={()=>setEditing(null)} style={{flex:1,padding:"6px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:12}}>Cancel</button>
              </div>
            </>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500,color:"#111827"}}>{s.name}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>Price: {fmt(s.price)}</div>
              </div>
              <button onClick={()=>{setEditing(s.id);setEditForm({name:s.name,price:s.price})}} style={{padding:"7px 12px",border:"none",borderRadius:8,background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>Edit</button>
              <button onClick={()=>{saveSkus(skus.filter(x=>x.id!==s.id));saveSales(sales.filter(x=>x.skuId!==s.id))}} style={{padding:"7px 12px",border:"none",borderRadius:8,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>Delete</button>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Users Admin ────────────────────────────────────────
function UsersAdmin({users,saveUsers}){
  const[form,setForm]=useState({name:"",role:"staff",pin:""});
  const[editing,setEditing]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[msg,setMsg]=useState("");
  function flash(m){setMsg(m);setTimeout(()=>setMsg(""),2500)}
  const inp={fontSize:13,padding:"7px 9px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"#f3f4f6",color:"#111827",width:"100%",boxSizing:"border-box"};
  return(
    <div style={{padding:"12px 0"}}>
      <div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:16,border:"0.5px solid #e5e7eb"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Add User</div>
        <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Full name" style={{...inp,marginBottom:8}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Role</div><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} style={inp}><option value="staff">Staff</option><option value="admin">Admin</option></select></div>
          <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>PIN (4 digits)</div><input type="password" inputMode="numeric" maxLength={4} value={form.pin} onChange={e=>setForm({...form,pin:e.target.value.replace(/\D/g,"")})} placeholder="Optional" style={inp}/></div>
        </div>
        <button onClick={()=>{
          if(!form.name.trim()){flash("Name is required.");return}
          if(form.pin&&(form.pin.length!==4||!/^\d+$/.test(form.pin))){flash("PIN must be 4 digits.");return}
          saveUsers([...users,{id:Date.now(),name:form.name.trim(),role:form.role,pin:form.pin||""}]);
          setForm({name:"",role:"staff",pin:""});flash("User added!");
        }} style={{width:"100%",padding:"8px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13,marginTop:4}}>Add User</button>
      </div>
      {msg&&<div style={{fontSize:13,color:msg.includes("!")?"#16a34a":"#dc2626",marginBottom:10}}>{msg}</div>}
      {users.map((u,i)=>{
        const color=USER_COLORS[i%USER_COLORS.length];
        return(
          <div key={u.id} style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"10px 14px",marginBottom:8}}>
            {editing===u.id?(
              <>
                <input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} style={{...inp,marginBottom:8}}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Role</div><select value={editForm.role} onChange={e=>setEditForm({...editForm,role:e.target.value})} style={inp}><option value="staff">Staff</option><option value="admin">Admin</option></select></div>
                  <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>New PIN</div><input type="password" inputMode="numeric" maxLength={4} value={editForm.pin} onChange={e=>setEditForm({...editForm,pin:e.target.value.replace(/\D/g,"")})} placeholder="4 digits" style={inp}/></div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{
                    if(!editForm.name.trim())return;
                    if(editForm.pin&&(editForm.pin.length!==4||!/^\d+$/.test(editForm.pin))){flash("PIN must be 4 digits.");return}
                    saveUsers(users.map(x=>x.id===u.id?{...x,name:editForm.name.trim(),role:editForm.role,pin:editForm.pin}:x));
                    setEditing(null);
                  }} style={{flex:1,padding:"6px",borderRadius:8,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer",fontSize:12}}>Save</button>
                  <button onClick={()=>setEditing(null)} style={{flex:1,padding:"6px",borderRadius:8,border:"0.5px solid #e5e7eb",background:"none",color:"#6b7280",cursor:"pointer",fontSize:12}}>Cancel</button>
                </div>
              </>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Avatar name={u.name} color={color} size={34}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:500,color:"#111827"}}>{u.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                    <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:u.role==="admin"?"#d1fae5":"#f3f4f6",color:u.role==="admin"?"#059669":"#6b7280"}}>{u.role==="admin"?"Admin":"Staff"}</span>
                    {u.pin&&<span style={{fontSize:10,color:"#6b7280"}}><i className="ti ti-lock" style={{fontSize:11,marginRight:2}}/>PIN set</span>}
                  </div>
                </div>
                <button onClick={()=>{setEditing(u.id);setEditForm({name:u.name,role:u.role,pin:u.pin||""})}} style={{padding:"7px 12px",border:"none",borderRadius:8,background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>Edit</button>
                <button onClick={()=>{
                  const admins=users.filter(x=>x.role==="admin"&&x.id!==u.id);
                  if(admins.length===0&&u.role==="admin"){flash("Cannot delete the last admin.");return}
                  saveUsers(users.filter(x=>x.id!==u.id));
                }} style={{padding:"7px 12px",border:"none",borderRadius:8,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>Delete</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
